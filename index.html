<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>光子盘点</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;margin:0;touch-action:none}
h3{text-align:center;font-size:24px;font-weight:bold;margin:10px 0}
#cameraWrap{position:relative;width:100vw;height:50vh;background:#000;overflow:hidden}
#video{width:100%;height:100%;object-fit:cover;transform-origin:center;will-change:transform;transform:translateZ(0)}
.focus-frame{position:absolute;top:50%;left:50%;width:200px;height:200px;transform:translate(-50%,-50%);border:2.5px solid #0ff;border-radius:10px;animation:breath 1.5s ease-in-out infinite}
@keyframes breath{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}50%{opacity:.6;transform:translate(-50%,-50%) scale(1.05)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#captureBtn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.95);border:4px solid #07f;font-size:30px;display:flex;align-items:center;justify-content:center;padding:0}
.toolbar{display:flex;justify-content:space-around;padding:10px 5px;background:#111;position:sticky;bottom:0;z-index:100}
.toolbar button{border:none;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px;flex:1;margin:0 4px;max-width:120px}
.toolbar button:nth-child(1){background:#17a2b8}
.toolbar button:nth-child(2){background:#28a745}
.toolbar button:nth-child(3){background:#ffc107;color:#333}
.toolbar button:nth-child(4){background:#fd7e14}
.toolbar button:nth-child(5){background:#6f42c1}
.toolbar button:nth-child(6){background:#20c997}
.toolbar button:nth-child(7){background:#dc3545}
#list{overflow-x:auto;padding:10px;display:none}
#list table{width:100%;border-collapse:collapse;background:#fff;font-size:12px}
#list table th,#list table td{border:1px solid #ddd;padding:6px;text-align:center;white-space:nowrap}
#list table th:last-child,#list table td:last-child{position:sticky;right:0;background:#fff;width:70px;min-width:70px}
#list table td:last-child button{width:100%;padding:6px 0;font-size:16px;background:#dc3545;color:#fff;border:none;border-radius:4px}
#list table tfoot td{position:sticky;bottom:0;background:#fff;font-weight:bold;border-top:2px solid #007bff;font-size:14px;z-index:2}
.modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:999}
.modal{background:#fff;padding:10px;border-radius:10px;width:92%;max-width:420px;max-height:88vh;overflow-y:auto;border:1px solid #007bff}
.modal h4{margin:5px 0 10px;font-size:17px;text-align:center;color:#007bff}
.form-group{margin-bottom:8px}
.form-group label{font-size:13px;color:#666;display:block;margin-bottom:3px}
.form-group input,.form-group select{width:100%;padding:9px;box-sizing:border-box;border:1px solid #ddd;border-radius:4px;font-size:16px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#007bff;box-shadow:0 0 0 2px rgba(0,123,255,.2)}
#previewImg{max-width:100%;width:auto;max-height:140px;object-fit:contain;margin-bottom:8px;border-radius:6px;border:1px solid #ddd;display:block;margin-left:auto;margin-right:auto}
.modal button[onclick="saveRecord()"]{width:100%;padding:14px 16px;margin-top:8px;background:linear-gradient(180deg,#28a745,#fd7e14);border:none;border-radius:10px;color:#fff;font-size:18px;font-weight:bold;box-shadow:0 4px 10px rgba(40,167,69,.35)}
.modal button[onclick="saveRecord()"]:active{transform:scale(.98)}
.thumbnail{width:50px;height:50px;object-fit:cover;border-radius:4px;cursor:pointer}
#exportMenu{display:none;position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#222;border-radius:12px;padding:6px 0;z-index:9999;min-width:180px;box-shadow:0 8px 30px rgba(0,0,0,.45)}
#exportMenu div{padding:14px 18px;color:#fff;font-size:15px}
#exportMenu div:active{background:#444}
#imgModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center;z-index:999}
#imgModal img{max-width:100%;max-height:100%}

.qty-control{display:flex;align-items:center}
.qty-control input{flex:1;text-align:center;border-radius:0;border-left:none;border-right:none}
.qty-btn{flex:0 0 44px;height:44px;font-size:22px;font-weight:bold;border:1px solid #ddd;background:#f8f9fa;cursor:pointer;user-select:none}
.qty-btn:first-child{border-radius:4px 0 0 4px}
.qty-btn:last-child{border-radius:0 4px 4px 0}
/* 修改点：字号由14px增至16px */
.list-summary{position:sticky;top:0;background:#007bff;color:#fff;padding:8px 12px;font-size:16px;font-weight:bold;z-index:10;border-radius:6px 6px 0 0;margin-bottom:-1px}
</style>
</head>

<body>
<h3>📦 光子盘点</h3>
<div id="cameraWrap">
  <video id="video" autoplay playsinline></video>
  <div class="focus-frame"></div>
  <button id="captureBtn">📸</button>
</div>
<div class="toolbar">
  <button onclick="rotate()">🔄 旋转</button>
  <button id="toggleListBtn" onclick="toggleList()">📋 清单</button>
  <button onclick="createBackup()">📥 备份</button>
  <button onclick="toggleExportMenu()">📤 导出</button>
  <button onclick="openRestoreModal()">♻️ 恢复</button>
  <button onclick="location.href='https://guangziv.github.io/Inventory/'">🔄 最新版</button>
  <button onclick="clearAll()">🗑️ 清空</button>
</div>
<div id="exportMenu">
  <div onclick="exportPackageZip()">📦 导出数据包</div>
  <div onclick="exportPackageExcel()">📷 导出带图 Excel</div>
</div>
<div class="modal-mask" id="formModal">
  <div class="modal">
    <h4>商品信息录入</h4>
    <img id="previewImg">
    <div class="form-group"><label>产品名称</label><input id="inp_name"></div>
    <div class="form-group">
      <label>产品类别</label>
      <select id="inp_category">
        <option value="床架">床架</option>
        <option value="床垫">床垫</option>
        <option value="床头柜">床头柜</option>
        <option value="沙发">沙发</option>
        <option value="小件">小件</option>
      </select>
    </div>
    <div class="form-group">
      <label>规格</label>
      <select id="inp_spec">
        <option value="1.8*2.0">1.8 × 2.0</option>
        <option value="1.5*2.0">1.5 × 2.0</option>
        <option value="custom">定制</option>
      </select>
    </div>
    <div class="form-group" id="customSpecGroup" style="display:none">
      <label>自定义规格</label>
      <input id="inp_custom_spec">
    </div>
    <div class="form-group"><label>颜色</label><input id="inp_color"></div>
    <div class="form-group">
      <label>数量</label>
      <div class="qty-control">
        <div class="qty-btn" onclick="changeQty(-1)">−</div>
        <input id="inp_qty" type="number" value="1">
        <div class="qty-btn" onclick="changeQty(1)">+</div>
      </div>
    </div>
    <div class="form-group"><label>备注</label><input id="inp_note"></div>
    <button onclick="saveRecord()">✅ 保存</button>
  </div>
</div>
<div class="modal-mask" id="restoreModal">
  <div class="modal">
    <h4>恢复备份</h4>
    <div id="backupListContainer" style="max-height:300px;overflow-y:auto"></div>
    <button onclick="closeRestoreModal()" style="width:100%;padding:10px;margin-top:10px;background:#ccc;border:none;border-radius:6px">关闭</button>
  </div>
</div>
<div id="imgModal" onclick="this.style.display='none'"><img id="bigImg"></div>
<div id="list"></div>
<script>
const DB_NAME="PhotonInventoryDB",DB_VER=1,STORE_REC="records",STORE_BAK="backups";
let records=[],dbReady=false,tempImage="",scale=1,offsetX=0,offsetY=0,rotation=0,listVisible=false;
const video=document.getElementById("video"),wrap=document.getElementById("cameraWrap"),captureBtn=document.getElementById("captureBtn");
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}}).then(s=>video.srcObject=s);
function applyTransform(){video.style.transform=`translate(${offsetX}px,${offsetY}px) scale(${scale}) rotate(${rotation}deg)`}
wrap.addEventListener("pointerdown",e=>{lastX=e.touches?e.touches[0].clientX:e.clientX;lastY=e.touches?e.touches[0].clientY:e.clientY});
wrap.addEventListener("pointermove",e=>{e.preventDefault();if(e.touches&&e.touches.length===1){offsetX+=e.touches[0].clientX-lastX;offsetY+=e.touches[0].clientY-lastY;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY}else{offsetX+=e.clientX-lastX;offsetY+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY}},{passive:false});
wrap.addEventListener("pointerup",()=>requestAnimationFrame(applyTransform));
function rotate(){rotation=(rotation+90)%360;requestAnimationFrame(applyTransform)}
captureBtn.onpointerdown=function(e){e.preventDefault();if(captureBtn.disabled)return;captureBtn.disabled=true;requestAnimationFrame(()=>{const c=document.createElement("canvas"),ctx=c.getContext("2d");let w=video.videoWidth,h=video.videoHeight;if(w>800){h=(800/w)*h;w=800}c.width=w;c.height=h;ctx.translate(w/2,h/2);ctx.rotate(rotation*Math.PI/180);ctx.scale(scale,scale);ctx.drawImage(video,-video.videoWidth/2+offsetX/scale,-video.videoHeight/2+offsetY/scale,video.videoWidth,video.videoHeight);tempImage=c.toDataURL("image/jpeg",0.65);document.getElementById("previewImg").src=tempImage;document.getElementById("formModal").style.display="flex";captureBtn.disabled=false})};
document.getElementById("inp_category").onchange=function(){const s=document.getElementById("inp_spec"),g=document.getElementById("customSpecGroup");if(["床头柜","沙发","小件"].includes(this.value)){s.value="custom";g.style.display="block"}else{g.style.display=s.value==="custom"?"block":"none"}};
document.getElementById("inp_spec").onchange=function(){document.getElementById("customSpecGroup").style.display=this.value==="custom"?"block":"none"};
function changeQty(delta){const inp=document.getElementById("inp_qty");let v=parseInt(inp.value)||1;v=Math.max(1,v+delta);inp.value=v}
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE_REC))db.createObjectStore(STORE_REC,{keyPath:"id",autoIncrement:true});if(!db.objectStoreNames.contains(STORE_BAK))db.createObjectStore(STORE_BAK,{keyPath:"key"})};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function initDB(){const db=await openDB();dbReady=true;await loadRecords(db)}
async function loadRecords(db){return new Promise(res=>db.transaction(STORE_REC,"readonly").objectStore(STORE_REC).getAll().onsuccess=e=>{records=e.target.result||[];res()})}
function withDB(fn){return async(...a)=>{if(!dbReady)await initDB();const db=await openDB();return fn(db,...a)}}
const saveRecord=withDB(async db=>{const n=document.getElementById("inp_name").value.trim();if(!n)return alert("产品名称不能为空");let s=document.getElementById("inp_spec").value;s=s==="custom"?document.getElementById("inp_custom_spec").value.trim()||"定制":s;const rec={time:new Date().toLocaleString(),name:n,category:document.getElementById("inp_category").value,spec:s,color:document.getElementById("inp_color").value.trim(),qty:document.getElementById("inp_qty").value,note:document.getElementById("inp_note").value.trim(),image:tempImage};await new Promise(r=>db.transaction(STORE_REC,"readwrite").objectStore(STORE_REC).put(rec).onsuccess=r);await loadRecords(db);document.getElementById("formModal").style.display="none";alert("保存成功！")});
function toggleList(){listVisible=!listVisible;document.getElementById("list").style.display=listVisible?"block":"none";document.getElementById("toggleListBtn").innerText=listVisible?"🙈 隐藏":"📋 清单";if(listVisible)renderList()}
function renderList(){
  if(!records.length){document.getElementById("list").innerHTML="<p style='text-align:center;color:#999'>暂无数据</p>";return}
  const total=records.reduce((s,r)=>s+Number(r.qty||0),0);
  let h=`<div class="list-summary">📦 当前总数量：${total}</div><table><tr><th>序号</th><th>时间</th><th>类别</th><th>图片</th><th>名称</th><th>规格</th><th>颜色</th><th>数量</th><th>备注</th><th>操作</th></tr>`;
  records.forEach((r,i)=>{h+=`<tr><td>${i+1}</td><td>${r.time}</td><td>${r.category}</td><td><img src="${r.image}" class="thumbnail" onclick="document.getElementById('bigImg').src=this.src;document.getElementById('imgModal').style.display='flex'"></td><td>${r.name}</td><td>${r.spec}</td><td>${r.color}</td><td>${r.qty}</td><td>${r.note}</td><td><button onclick="deleteRecord(${i})">🗑️</button></td></tr>`});
  const cat={};records.forEach(r=>cat[r.category]=(cat[r.category]||0)+Number(r.qty||0));
  Object.keys(cat).forEach(k=>h+=`<tr><td colspan="6"></td><td>${k} 合计：</td><td>${cat[k]}</td><td colspan="2"></td></tr>`);
  // 修改点：表格合计行文字变更
  h+=`<tfoot><tr><td colspan="6"></td><td>盘点总计：</td><td>${total}</td><td colspan="2"></td></tr></tfoot></table>`;
  document.getElementById("list").innerHTML=h
}
const deleteRecord=withDB(async(db,i)=>{if(!confirm("确定删除这条记录吗？"))return;await new Promise(r=>db.transaction(STORE_REC,"readwrite").objectStore(STORE_REC).delete(records[i].id).onsuccess=r);await loadRecords(db);renderList()});
const createBackup=withDB(async db=>{if(!records.length)return alert("❌ 备份失败：暂无数据！");const t=Date.now(),key=`inventory_backup_${t}`;await new Promise(r=>db.transaction(STORE_BAK,"readwrite").objectStore(STORE_BAK).put({key,time:new Date().toLocaleString(),count:records.length,locked:false}).onsuccess=r);alert("✅ 备份成功！")});
const openRestoreModal=withDB(async db=>{const c=document.getElementById("backupListContainer"),list=await new Promise(r=>db.transaction(STORE_BAK,"readonly").objectStore(STORE_BAK).getAll().onsuccess=e=>r(e.target.result||[]));if(!list.length){c.innerHTML="<p style='text-align:center;color:#999'>暂无备份记录</p>";document.getElementById("restoreModal").style.display="flex";return}list.sort((a,b)=>(a.locked&&!b.locked)?-1:(!a.locked&&b.locked)?1:new Date(b.time)-new Date(a.time));c.innerHTML=list.map(i=>`<div style="background:${i.locked?'#eef6ff':'#fff'};padding:6px 8px;border-bottom:1px solid #eee;font-size:13px"><div onclick="restoreFromBackup('${i.key}')" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-weight:bold">📅 ${i.time}</span><span style="color:#888">${i.count} 条</span></div><div style="display:flex;gap:6px"><button onclick="toggleLockBackup('${i.key}')" style="flex:1;padding:5px 0;font-size:12px;border:none;border-radius:4px;${i.locked?'background:#6c757d':'background:#17a2b8'};color:#fff">${i.locked?'🔒 已锁':'🔓 锁定'}</button><button onclick="deleteBackup('${i.key}')" style="flex:1;padding:5px 0;font-size:12px;background:#dc3545;color:#fff;border:none;border-radius:4px">❌ 删除</button></div></div>`).join("");document.getElementById("restoreModal").style.display="flex"});
function closeRestoreModal(){document.getElementById("restoreModal").style.display="none"}
const restoreFromBackup=withDB(async(db,key)=>{if(!confirm("确定恢复？当前数据将丢失！"))return;await new Promise(r=>db.transaction(STORE_REC,"readwrite").objectStore(STORE_REC).clear().onsuccess=r);await loadRecords(db);closeRestoreModal();alert("恢复成功！");if(listVisible)renderList()});
const toggleLockBackup=withDB(async(db,key)=>{const list=await new Promise(r=>db.transaction(STORE_BAK,"readonly").objectStore(STORE_BAK).getAll().onsuccess=e=>r(e.target.result));const i=list.find(x=>x.key===key);if(!i)return;i.locked=!i.locked;await new Promise(r=>db.transaction(STORE_BAK,"readwrite").objectStore(STORE_BAK).put(i).onsuccess=r);openRestoreModal()});
const deleteBackup=withDB(async(db,key)=>{const list=await new Promise(r=>db.transaction(STORE_BAK,"readonly").objectStore(STORE_BAK).getAll().onsuccess=e=>r(e.target.result));const i=list.find(x=>x.key===key);if(i?.locked)return alert("已锁定，无法删除！");if(!confirm("确定删除？"))return;await new Promise(r=>db.transaction(STORE_BAK,"readwrite").objectStore(STORE_BAK).delete(key).onsuccess=r);alert("已删除！");openRestoreModal()});
const clearAll=withDB(async db=>{if(!confirm("确定清空所有数据？"))return;await new Promise(r=>db.transaction(STORE_REC,"readwrite").objectStore(STORE_REC).clear().onsuccess=r);records=[];document.getElementById("list").innerHTML="";alert("已清空")});
function toggleExportMenu(){const m=document.getElementById("exportMenu");m.style.display=m.style.display==="block"?"none":"block"}
document.addEventListener("click",e=>{const m=document.getElementById("exportMenu"),btn=document.querySelector(".toolbar button[onclick*='toggleExportMenu']");if(m.style.display==="block"&&!m.contains(e.target)&&e.target!==btn)m.style.display="none"});
async function exportPackageZip(){if(!records.length)return alert("❌ 导出失败：暂无数据！");try{const z=new JSZip(),wb=XLSX.utils.book_new();wb.Props={Title:"光子盘点",Author:"光子盘点系统"};const ws=XLSX.utils.json_to_sheet([],{header:["序号","时间","产品类别","产品名称","规格","颜色","数量","备注","图片编号"]});records.forEach((r,i)=>{const id=`IMG_${String(i+1).padStart(4,"0")}`;XLSX.utils.sheet_add_json(ws,[{序号:i+1,时间:r.time,产品类别:r.category,产品名称:r.name,规格:r.spec,颜色:r.color,数量:r.qty,备注:r.note,图片编号:id}],{skipHeader:true,origin:i+1});const img=new Image();img.src=r.image;const c=document.createElement("canvas"),ctx=c.getContext("2d");c.width=img.width;c.height=img.height;ctx.drawImage(img,0,0,img.width,img.height);z.folder("images").file(`${id}.jpg`,c.toDataURL("image/jpeg",0.65).split(",")[1],{base64:true})});const cat={};records.forEach(r=>cat[r.category]=(cat[r.category]||0)+Number(r.qty||0));Object.keys(cat).forEach(k=>XLSX.utils.sheet_add_json(ws,[{序号:"",时间:"",产品类别:k,产品名称:"类别合计",规格:"",颜色:"",数量:cat[k],备注:"",图片编号:""}],{skipHeader:true,origin:-1}));const total=records.reduce((s,r)=>s+Number(r.qty||0),0);
  // 修改点：ZIP导出Excel合计行文字变更
  XLSX.utils.sheet_add_json(ws,[{序号:"",时间:"",产品类别:"总计",产品名称:"盘点总计",规格:"",颜色:"",数量:total,备注:"",图片编号:""}],{skipHeader:true,origin:-1});XLSX.utils.book_append_sheet(wb,ws,"盘点数据");const d=new Date(),ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;z.file(`光子盘点_${ds}.xlsx`,XLSX.write(wb,{bookType:"xlsx",type:"array"}),{binary:true});await saveAs(await z.generateAsync({type:"blob",compression:"STORE"}),`光子盘点_${ds}.zip`);alert("✅ ZIP 导出成功！")}catch(e){alert("❌ 导出失败："+(e.message.includes("JSZip")?"压缩包生成失败":"文件下载失败"));console.error(e)}}
async function exportPackageExcel(){if(!records.length)return alert("❌ 导出失败：暂无数据！");if(!listVisible)toggleList();const table=document.getElementById("list").querySelector("table");if(!table)return alert("❌ 导出失败：未检测到表格数据！");const btn=document.querySelector(".toolbar button[onclick*='toggleExportMenu']");btn.innerText="⏳ 生成中";btn.disabled=true;try{const wb=new ExcelJS.Workbook(),ws=wb.addWorksheet("盘点清单");ws.addRow(["序号","时间","产品类别","图片","产品名称","规格","颜色","数量","备注"]);records.forEach((r,i)=>ws.addRow([i+1,r.time,r.category,"",r.name,r.spec,r.color,r.qty,r.note]));const cat={};records.forEach(r=>cat[r.category]=(cat[r.category]||0)+Number(r.qty||0));Object.keys(cat).forEach(k=>{const row=ws.addRow([]);row.getCell(7).value=k+" 合计：";row.getCell(8).value=cat[k]});const total=records.reduce((s,r)=>s+Number(r.qty||0),0);const tr=ws.addRow([]);
  // 修改点：Excel导出合计行文字变更
  tr.getCell(7).value="盘点总计：";tr.getCell(8).value=total;ws.columns=[{width:6},{width:20},{width:10},{width:16},{width:16},{width:12},{width:10},{width:8},{width:16}];table.querySelectorAll("img").forEach((img,i)=>{try{const id=wb.addImage({base64:img.src.split(",")[1],extension:"jpeg"});ws.addImage(id,{tl:{col:3,row:i+1},ext:{width:60,height:60}});ws.getRow(i+2).height=50}catch(e){}});const d=new Date(),ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;await saveAs(new Blob([await wb.xlsx.writeBuffer()],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}),`光子盘点_${ds}_带图.xlsx`);alert("✅ Excel 导出成功！")}catch(e){alert("❌ Excel 导出失败："+e.message);console.error(e)}finally{if(listVisible)toggleList();btn.innerText="📤 导出";btn.disabled=false;document.getElementById("exportMenu").style.display="none"}}
initDB();
</script>
</body>
</html>
