<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>扫码最终版</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<!-- ✅ 官方扫码库 -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/minified_html5-qrcode.min.js"></script>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;text-align:center;padding:20px}
button{padding:16px 30px;font-size:20px;border-radius:10px;border:none;background:#007bff;color:#fff;cursor:pointer}
#reader{width:100%;max-width:400px;height:260px;margin:15px auto;background:#000;border-radius:8px;display:none}
#status{margin-top:15px;padding:12px;border-radius:6px;font-size:15px;word-break:break-all}
.success{background:#d4edda;color:#155724}
.error{background:#f8d7da;color:#721c24}
.info{background:#cce5ff;color:#004085}
</style>
</head>

<body>

<h3>扫码最终可用版</h3>
<p>点击下方按钮开始扫码</p>

<button id="scanBtn">📱 点击扫码</button>

<div id="reader"></div>
<div id="status" class="info">等待操作...</div>

<script>
let html5QrCode = null;
let isScanning = false;

// ✅ 等页面 + 库全部加载完成
window.addEventListener("load", () => {
  const btn = document.getElementById("scanBtn");
  const reader = document.getElementById("reader");
  const status = document.getElementById("status");

  if (typeof Html5Qrcode === "undefined") {
    status.className = "error";
    status.innerHTML = "❌ 扫码库未加载<br>请检查网络或刷新页面";
    btn.disabled = true;
    return;
  }

  btn.addEventListener("click", () => {
    if (isScanning) {
      stopScan();
      return;
    }
    startScan();
  });

  function startScan() {
    isScanning = true;
    reader.style.display = "block";
    status.className = "info";
    status.innerHTML = "📡 正在启动摄像头...";

    html5QrCode = new Html5Qrcode("reader");

    // ✅ 标准、合规的 getUserMedia 参数
    const config = {
      fps: 10,
      qrbox: { width: 260, height: 180 }
    };

    const constraints = {
      video: {
        facingMode: "environment"
      }
    };

    html5QrCode.start(constraints, config, onScanSuccess, onScanFailure)
      .catch(err => showError("摄像头启动失败", err));
  }

  function stopScan() {
    isScanning = false;
    if (html5QrCode) {
      html5QrCode.stop().catch(() => {});
    }
    reader.style.display = "none";
    btn.innerText = "📱 点击扫码";
  }

  function onScanSuccess(decodedText) {
    stopScan();
    status.className = "success";
    status.innerHTML = `✅ 扫码成功：<br><strong>${decodedText}</strong>`;
  }

  function onScanFailure(err) {
    if (!err.includes("NotFoundException")) {
      console.warn(err);
    }
  }

  function showError(title, err) {
    stopScan();
    status.className = "error";
    let msg = "未知错误";

    if (err.name === "NotAllowedError") {
      msg = "浏览器拒绝了摄像头权限<br>👉 请在地址栏左侧允许";
    } else if (err.name === "NotFoundError") {
      msg = "未检测到摄像头";
    } else {
      msg = err.message;
    }

    status.innerHTML = `❌ ${title}<br><small>${msg}</small>`;
  }
});
</script>

</body>
</html>
