<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;}
h3{text-align:center;font-size:24px;font-weight:bold;margin:10px 0}
#cameraWrap{position:relative;width:100vw;height:50vh;background:#000;overflow:hidden;}
#video{width:100%;height:100%;object-fit:cover;will-change:transform;}
.focus-frame{position:absolute;top:50%;left:50%;width:260px;height:160px;transform:translate(-50%,-50%);border:2.5px solid #0ff;border-radius:10px;pointer-events:none;}
.ocr-frame{position:absolute;top:50%;left:50%;width:240px;height:48px;transform:translate(-50%,-50%);border:2px dashed rgba(255,0,0,.85);border-radius:6px;pointer-events:none;z-index:11;}
#realtimeOcrResult{position:absolute;top:calc(50% + 40px);left:50%;transform:translateX(-50%);width:90%;max-width:300px;background:rgba(0,0,0,.75);color:#0f0;font-size:14px;font-weight:bold;text-align:center;padding:6px 10px;border-radius:6px;z-index:12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:none;}
#cameraActions{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:10}
#captureBtn,#scanBtn,#realtimeOcrBtn{width:72px;height:72px;border-radius:50%;border:4px solid #fff;font-size:28px;display:flex;align-items:center;justify-content:center}
#captureBtn{background:rgba(255,255,255,.95);border-color:#07f}
#scanBtn{background:rgba(40,167,69,.95);color:#fff;font-weight:700;font-size:26px}
#realtimeOcrBtn{background:rgba(255,193,7,.95);color:#333;font-size:22px}
.toolbar{display:flex;justify-content:space-around;padding:10px 5px;background:#111;position:sticky;bottom:0;z-index:100}
.toolbar button{border:none;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px;flex:1;margin:0 4px;max-width:120px}
.toolbar button:nth-child(1){background:#17a2b8}
.toolbar button:nth-child(2){background:#28a745}
.toolbar button:nth-child(3){background:#ffc107;color:#333}
.toolbar button:nth-child(4){background:#fd7e14}
.toolbar button:nth-child(5){background:#6f42c1}
.toolbar button:nth-child(6){background:#20c997}
.toolbar button:nth-child(7){background:#dc3545}
#list{overflow-x:auto;padding:10px;display:none}
#list table{width:100%;border-collapse:collapse;background:#fff;font-size:12px}
#list th,#list td{border:1px solid #ddd;padding:6px;text-align:center;white-space:nowrap}
#list th:last-child,#list td:last-child{position:sticky;right:0;background:#fff;width:70px}
#list td:last-child button{width:100%;padding:6px 0;font-size:16px;background:#dc3545;color:#fff;border:none;border-radius:4px}
#list tfoot td{position:sticky;bottom:0;background:#fff;font-weight:bold;border-top:2px solid #007bff;font-size:14px}
.modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:999}
.modal{background:#fff;padding:10px;border-radius:10px;width:92%;max-width:420px;max-height:88vh;overflow-y:auto;border:1px solid #007bff}
.modal h4{margin:5px 0 10px;font-size:17px;text-align:center;color:#007bff}
.form-group{margin-bottom:8px}
.form-group label{font-size:13px;color:#666;display:block;margin-bottom:3px}
.form-group input,.form-group select{width:100%;height:46px;line-height:46px;padding:0 9px;box-sizing:border-box;border:1px solid #ddd;border-radius:8px;font-size:16px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#007bff;box-shadow:0 0 0 2px rgba(0,123,255,.2)}
#imagePreview{width:100%;max-height:140px;object-fit:contain;display:block;margin-bottom:8px;border:1px solid #ddd;border-radius:6px;}
.modal button.save{width:100%;background:linear-gradient(180deg,#28a745,#fd7e14);border:none;border-radius:10px;color:#fff;font-size:18px;font-weight:bold;box-shadow:0 4px 10px rgba(40,167,69,.35)}
.thumbnail{width:50px;height:50px;object-fit:cover;border-radius:4px;cursor:pointer}
#exportMenu{display:none;position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#222;border-radius:12px;padding:6px 0;z-index:9999;min-width:180px}
#exportMenu div{padding:14px 18px;color:#fff;font-size:15px}
#exportMenu div:active{background:#444}
#imgModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center;z-index:999}
#imgModal img{max-width:100%;max-height:100%}
.qty-control{display:flex;align-items:center;border-radius:8px;overflow:hidden;border:1px solid #ddd;width:fit-content}
.qty-control input{flex:1;height:46px;min-width:60px;text-align:center;border:none;font-size:16px;background:#fff;outline:none}
.qty-btn{width:40px;height:46px;font-size:22px;font-weight:600;border:none;background:linear-gradient(180deg,#f8f9fa,#e9ecef);cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center}
.qty-btn:first-child{border-radius:8px 0 0 8px}
.qty-btn:last-child{border-radius:0 8px 8px 0}
.list-summary{position:sticky;top:0;background:#007bff;color:#fff;padding:8px 12px;font-size:16px;font-weight:bold;z-index:10;border-radius:6px 6px 0 0;margin-bottom:-1px}
.advanced-toggle{text-align:center;color:#007bff;font-size:15px;margin-top:10px;cursor:pointer}
.advanced-panel{display:none;border-top:1px solid #eee;padding-top:8px;margin-top:8px}
#scanner_container{width:100%;height:200px;background:#000;border-radius:6px;margin-bottom:10px;display:none}
#scanStatus{text-align:center;font-size:14px;color:#007bff;margin-bottom:6px;min-height:22px}
.code-item{display:flex;justify-content:space-between;align-items:center;padding:8px;font-size:13px;border-bottom:1px solid #eee}
.code-item:last-child{border-bottom:none}
.code-item span{font-weight:bold;color:#007bff}
.code-item button{background:#dc3545;color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:12px}
.form-btn{flex:1;padding:14px 16px;border:none;border-radius:10px;font-size:18px;font-weight:bold;box-sizing:border-box}
#categoryBar{display:none;position:fixed;bottom:62px;left:0;right:0;background:#111;padding:10px 0;z-index:95;text-align:center;}
#categoryBar span{color:#fff;font-size:42px;font-weight:bold;letter-spacing:6px;user-select:none;}
#categoryBar small{display:block;color:#aaa;font-size:12px;margin-top:2px}
</style>
</head>

<body>

  <video id="video" autoplay playsinline></video>

<div id="categoryBar" onclick="showCategoryPicker()">

<div id="exportMenu">

  <div onclick="exportPackageExcel()">📷 导出带图 Excel</div>

<div class="modal-mask" id="formModal">

    <h4>商品信息录入</h4>
    <div id="scanner_container"></div>
    <div id="scanStatus"></div>
    <div class="form-group"><label>识别到的条码</label><input id="inp_code_display" type="text" readonly style="background:#e9ecef; font-weight:bold; color:#007bff;"></div>
    <button id="scanFileBtn">🖼️ 扫描本地图片</button>
    <input id="fileInput" type="file" accept="image/*">
    <img id="imagePreview" alt="拍摄的图片">
    <div class="form-group"><label>产品名称</label><input id="inp_name"></div>
    <div style="display:flex;gap:10px">
      <div class="form-group" style="flex:1"><label>产品类别</label>
        <select id="inp_category">
          <option>床架</option><option>床垫</option><option>床头柜</option><option>沙发</option><option>小件</option>
        </select>
      </div>
      <div class="form-group" style="flex:1"><label>规格</label>
        <select id="inp_spec">
          <option value="1.8*2.0">1.8×2.0</option><option value="1.5*2.0">1.5×2.0</option><option value="custom">定制</option>
        </select>
      </div>
    </div>
    <div class="form-group" id="customSpecGroup" style="display:none"><label>自定义规格</label><input id="inp_custom_spec"></div>
    <div style="display:flex;gap:10px">
      <div class="form-group" style="flex:1"><label>颜色</label><input id="inp_color"></div>

        <div class="qty-control">
          <div class="qty-btn" onclick="changeQty(-1)">−</div>

    </div>

    <div class="advanced-panel" id="advancedPanel">

          <input type="checkbox" id="autoDictSwitch" checked style="width:16px;height:16px">
          仅在名称未修改时自动保存条码（防误触）

      </div>
      <div style="display:flex;gap:10px;margin-top:10px">
        <button onclick="importCodeDict()" style="flex:1;padding:10px;background:#20c997;color:#fff;border:none;border-radius:6px;font-size:14px">📥 导入字典</button>
        <button onclick="openCodeModal()" style="flex:1;padding:10px;background:#6f42c1;color:#fff;border:none;border-radius:6px;font-size:14px">📇 管理条码字典</button>

<div id="imgModal" onclick="this.style.display='none'"><img id="bigImg"></div>

<script>
/* ========== OCR 统计系统 ========== */
let ocrStats = {
  local: { calls: 0, success: 0, fail: 0, totalTime: 0 },
  tencent: { calls: 0, success: 0, fail: 0, totalTime: 0 },
  baidu: { calls: 0, success: 0, fail: 0, totalTime: 0 }
};

function recordOcrStat(source, success, duration) {
  const s = ocrStats[source];
  s.calls++;
  if (success) s.success++; else s.fail++;
  s.totalTime += duration;
}

function updateOcrStatsDisplay() {
  const d = document.getElementById('ocrStatsDisplay');
  if (!d) return;
  d.innerHTML = `
    <b>本地 OCR：</b> ${ocrStats.local.calls}次 | 成功 ${ocrStats.local.success} | 失败 ${ocrStats.local.fail}<br>
    <b>腾讯云：</b> ${ocrStats.tencent.calls}次 | 成功 ${ocrStats.tencent.success} | 失败 ${ocrStats.tencent.fail}<br>
    <b>百度云：</b> ${ocrStats.baidu.calls}次 | 成功 ${ocrStats.baidu.success} | 失败 ${ocrStats.baidu.fail}
  `;
}

/* ========== 基础工具 ========== */
function escapeHtml(s){
  if(typeof s !== 'string') return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ========== 全局变量 ========== */
let lastX=0,lastY=0;
const DB_NAME="PhotonInventoryDB",DB_VER=3,STORE_REC="records",STORE_BAK="backups",STORE_CODE="codes";
let records=[],dbReady=false,tempImageData="",scale=1,offsetX=0,offsetY=0,rotation=0,listVisible=false,isScanning=false,allCodesCache=[],currentScanner=null;
let listPage=0, PAGE_SIZE=50;
let isMultiTouch = false;
let lastDist = 0;
let lastAngle = 0;

let realtimeOcrActive = false;
let ocrLocalActive = false, ocrTencentActive = false, ocrBaiduActive = false;
let ocrLocalTimer = null, ocrTencentTimer = null, ocrBaiduTimer = null;

let latestOcrText = '';
let lastTap = 0;
let ocrWorker = null;

let currentVideoTrack = null;
function updateFlashlight(enable) {
  if (!currentVideoTrack) return;
  if (!currentVideoTrack.getCapabilities?.()?.torch) return;
  try {
    currentVideoTrack.applyConstraints({
      advanced: [{ torch: enable }]
    });
  } catch (e) {
    console.warn("闪光灯不支持", e);
  }
}

async function initOcrWorker() {
  if (!ocrWorker) {
    ocrWorker = await Tesseract.createWorker('chi_sim+eng', 1, {
      logger: m => console.log(m)
    });
  }
  return ocrWorker;
}

const video=document.getElementById("video"),wrap=document.getElementById("cameraWrap"),captureBtn=document.getElementById("captureBtn"),scanBtn=document.getElementById("scanBtn"),realtimeOcrBtn=document.getElementById("realtimeOcrBtn");
const scanStatus=document.getElementById("scanStatus");
const realtimeOcrResultDiv = document.getElementById('realtimeOcrResult');
const imagePreview = document.getElementById('imagePreview');

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>{
  video.srcObject=s;
  currentVideoTrack = s.getVideoTracks()[0];
  updateFlashlight(document.getElementById("flashlightSwitch")?.checked || false);
}).catch(()=>alert("❌ 无法访问摄像头"))

function applyTransform(){
  video.style.transform=`translate(${offsetX}px,${offsetY}px) scale(${scale}) rotate(${rotation}deg)`;
}

wrap.addEventListener("touchend",e=>{
  const currentTime = new Date().getTime();
  const tapLength = currentTime - lastTap;
  if (tapLength < 300 && tapLength > 0) {
    scale = 1; offsetX = 0; offsetY = 0; rotation = 0;
    applyTransform();
    navigator.vibrate && navigator.vibrate(50);
  }
  lastTap = currentTime;
});

wrap.addEventListener("pointerdown",e=>{
  if(e.pointerType==="mouse"){
    lastX=e.clientX;lastY=e.clientY;
    wrap.setPointerCapture(e.pointerId);
  }
});

wrap.addEventListener("pointermove",e=>{
  if(e.pointerType==="mouse" && e.buttons&1){
    offsetX+=e.clientX-lastX;offsetY+=e.clientY-lastY;
    lastX=e.clientX;lastY=e.clientY;
    requestAnimationFrame(applyTransform);
  }
});

wrap.addEventListener("touchstart",e=>{
  if(e.touches.length===1){
    lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    isMultiTouch=true;lastDist=getDist(e);lastAngle=getAngle(e);
  }
});

wrap.addEventListener("touchmove",e=>{
  if(e.touches.length===1 && !isMultiTouch){
    e.preventDefault();
    offsetX+=e.touches[0].clientX-lastX;
    offsetY+=e.touches[0].clientY-lastY;
    lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const d=getDist(e),a=getAngle(e);
    scale=Math.max(1,Math.min(3,scale*d/lastDist));
    rotation+=a-lastAngle;
    lastDist=d;lastAngle=a;
  }
  requestAnimationFrame(applyTransform);
},{passive:false});

wrap.addEventListener("touchend",()=>isMultiTouch=false);

function rotate(){
  rotation=(rotation+90)%360;
  requestAnimationFrame(applyTransform);
}

function stopCamera(){
  try{
    const s=video.srcObject;
    if(s) s.getTracks().forEach(t=>t.stop());
    video.srcObject=null;
  }catch(e){}
  realtimeOcrActive=false;
  ocrLocalActive = ocrTencentActive = ocrBaiduActive = false;
  clearTimeout(ocrLocalTimer);
  clearTimeout(ocrTencentTimer);
  clearTimeout(ocrBaiduTimer);
  realtimeOcrResultDiv.style.display="none";
  realtimeOcrBtn.style.background='rgba(255,193,7,.95)';

/* ===== 图像预处理 ===== */
function preprocessCanvasForOCR(ctx, w, h) {
  const MAX_W = 640;
  const scale = Math.min(1, MAX_W / w);
  const sw = Math.floor(w * scale);
  const sh = Math.floor(h * scale);

  const off = document.createElement("canvas");
  off.width = sw;
  off.height = sh;
  const offCtx = off.getContext("2d");

  offCtx.drawImage(ctx.canvas, 0, 0, sw, sh);

  const imgData = offCtx.getImageData(0, 0, sw, sh);
  const data = imgData.data;

  let sum = 0;
  for (let i = 0; i < data.length; i += 4) {
    sum += data[i];
  }
  const avg = sum / (data.length / 4);
  const threshold = Math.max(90, Math.min(170, avg * 0.85));

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    let gray = r * 0.299 + g * 0.587 + b * 0.114;
    gray *= 0.85;
    const bw = gray > threshold ? 255 : 0;

    data[i] = data[i + 1] = data[i + 2] = bw;
  }

  offCtx.putImageData(imgData, 0, 0);

  ctx.canvas.width = sw;
  ctx.canvas.height = sh;
  ctx.drawImage(off, 0, 0);
}

/* ===== 本地 OCR ===== */
async function realTimeLocalOcr(){
  if(!ocrLocalActive || video.paused) return;
  const start = Date.now();
  const frame=document.querySelector('.ocr-frame');
  const vr=video.getBoundingClientRect();
  const fr=frame.getBoundingClientRect();

  const canvas=document.createElement('canvas');
  canvas.width=fr.width;
  canvas.height=fr.height;
  const ctx=canvas.getContext('2d');

  ctx.drawImage(
    video,
    fr.left - vr.left,
    fr.top - vr.top,
    fr.width,
    fr.height,
    0,
    0,
    fr.width,
    fr.height
  );

  preprocessCanvasForOCR(ctx, fr.width, fr.height);

  const dataUrl=canvas.toDataURL("image/jpeg",0.95);
  try {
    const worker = await initOcrWorker();
    const {data} = await worker.recognize(dataUrl);
    
    if(data.text && data.confidence > 60){
      document.getElementById('inp_name').value = data.text.trim().split('\n')[0];
      realtimeOcrResultDiv.innerText = `[本地] ${data.text.trim()}`;
      recordOcrStat('local', true, Date.now() - start);
    } else {
      recordOcrStat('local', false, Date.now() - start);
    }
  } catch(err) {
    recordOcrStat('local', false, Date.now() - start);
  }
  ocrLocalTimer=setTimeout(realTimeLocalOcr,1200);
}

captureBtn.onpointerdown=function(e){
  e.preventDefault();
  navigator.vibrate&&navigator.vibrate(50);
  
  updateFlashlight(false);

  ocrLocalActive = ocrTencentActive = ocrBaiduActive = false;
  clearTimeout(ocrLocalTimer);
  clearTimeout(ocrTencentTimer);
  clearTimeout(ocrBaiduTimer);

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const frame=document.querySelector('.focus-frame');
  const fr=frame.getBoundingClientRect();
  const vr=video.getBoundingClientRect();

  const scaleX = vw / vr.width;
  const scaleY = vh / vr.height;

  let cx = (fr.left - vr.left + fr.width / 2) * scaleX;
  let cy = (fr.top - vr.top + fr.height / 2) * scaleY;

  const angle = rotation * Math.PI / 180;
  const rx = (cx - vw / 2) * Math.cos(angle) + (cy - vh / 2) * Math.sin(angle) + vw / 2;
  const ry = -(cx - vw / 2) * Math.sin(angle) + (cy - vh / 2) * Math.cos(angle) + vh / 2;

  const sw = fr.width * scaleX;
  const sh = fr.height * scaleY;

  const canvas=document.createElement('canvas');
  canvas.width=sw;
  canvas.height=sh;
  const ctx=canvas.getContext('2d');
  
  ctx.translate(sw / 2, sh / 2);
  ctx.rotate(-angle);
  ctx.drawImage(
    video,
    rx - sw / 2,
    ry - sh / 2,
    sw,
    sh,
    -sw / 2,
    -sh / 2,
    sw,
    sh
  );
  
  tempImageData=canvas.toDataURL("image/jpeg",0.98);
  
  const modal=document.getElementById('formModal');
  modal.style.display='flex';
  imagePreview.src = tempImageData;
  imagePreview.style.display = 'block';
};

async function handleScanSuccess(code){
  if(!isScanning) return;
  navigator.vibrate&&navigator.vibrate(100);
  scanStatus.innerText="✅ 识别成功";
  document.getElementById("inp_code_display").value=code;

  const db = await openDB();
  const all = await new Promise(r =>
    db.transaction(STORE_CODE,"readonly")
      .objectStore(STORE_CODE)
      .getAll()
      .onsuccess = e => r(e.target.result)
  );

  let matched = null;
  let codeType = "";

  const onlyMain = document.getElementById('onlyMainCodeSwitch').checked;
  const onlyItem = document.getElementById('onlyItemCodeSwitch').checked;

  if (!onlyItem) {
    matched = all.find(i => i.code === code);
    if (matched) codeType = "main";
  }

  if (!matched && !onlyMain) {
    matched = all.find(i => i.codes && i.codes.includes(code));
    if (matched) codeType = "item";
  }

  if(matched){
    document.getElementById("inp_name").value = matched.model;
    document.getElementById("inp_category").value = matched.category;
    document.getElementById("inp_code_display").dataset.codeType = codeType;
  }

  if(currentScanner) currentScanner.pause();
}

function compressImage(base64, maxW = 2800, quality = 0.96) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const scale = Math.min(maxW / img.width, 1);
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      
      res(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = base64;
  });
}

  if(!list.length){c.innerHTML="<p style='text-align:center;color:#999'>暂无备份记录</p>";document.getElementById("restoreModal").style.display="flex";return;}
  list.sort((a,b)=>(a.locked&&!b.locked)?-1:(!a.locked&&b.locked)?1:new Date(b.time)-new Date(a.time));
  c.innerHTML=list.map(i=>`<div style="background:${i.locked?'#eef6ff':'#fff'};padding:6px 8px;border-bottom:1px solid #eee;font-size:13px"><div onclick="restoreFromBackup('${i.key}')" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-weight:bold">📅 ${escapeHtml(i.time)}</span><span style="color:#888">${i.count} 条</span></div><div style="display:flex;gap:6px"><button onclick="toggleLockBackup('${i.key}')" style="flex:1;padding:5px 0;font-size:12px;border:none;border-radius:4px;${i.locked?'background:#6c757d':'background:#17a2b8'};color:#fff">${i.locked?'🔒 已锁':'🔓 锁定'}</button><button onclick="deleteBackup('${i.key}')" style="flex:1;padding:5px 0;font-size:12px;background:#dc3545;color:#fff;border:none;border-radius:4px">❌ 删除</button></div></div>`).join("");
  document.getElementById("restoreModal").style.display="flex";
});

function closeRestoreModal(){document.getElementById("restoreModal").style.display="none";}

const restoreFromBackup=withDB(async(db,key)=>{
  if(!confirm("确定恢复？当前数据将丢失！"))return;
  const backup=await new Promise(res=>db.transaction(STORE_BAK,"readonly").objectStore(STORE_BAK).get(key).onsuccess=e=>res(e.target.result));
  if(!backup||!backup.data){alert("❌ 恢复失败：备份数据为空或损坏！");return;}
  await new Promise(r=>db.transaction(STORE_REC,"readwrite").objectStore(STORE_REC).clear().onsuccess=r);
  const tx=db.transaction(STORE_REC,"readwrite");const store=tx.objectStore(STORE_REC);
  backup.data.forEach(record=>{if(!record.id)delete record.id;store.put(record);});
  await new Promise(r=>tx.oncomplete=r);
  await loadRecords(db);
  closeRestoreModal();
  alert("恢复成功！");
  if(listVisible)renderList();
});

const toggleLockBackup=withDB(async(db,key)=>{const list=await new Promise(res=>db.transaction(STORE_BAK,"readonly").objectStore(STORE_BAK).getAll().onsuccess=e=>res(e.target.result||[]));const i=list.find(x=>x.key===key);if(!i)return;i.locked=!i.locked;await new Promise(r=>db.transaction(STORE_BAK,"readwrite").objectStore(STORE_BAK).put(i).onsuccess=r);openRestoreModal();});
const deleteBackup=withDB(async(db,key)=>{const list=await new Promise(res=>db.transaction(STORE_BAK,"readonly").objectStore(STORE_BAK).getAll().onsuccess=e=>res(e.target.result||[]));const i=list.find(x=>x.key===key);if(i?.locked)return alert("已锁定，无法删除！");if(!confirm("确定删除？"))return;await new Promise(r=>db.transaction(STORE_BAK,"readwrite").objectStore(STORE_BAK).delete(key).onsuccess=r);alert("已删除！");openRestoreModal();});

const clearAll=withDB(async db=>{if(!confirm("确定清空所有数据？"))return;await new Promise(r=>db.transaction(STORE_REC,"readwrite").objectStore(STORE_REC).clear().onsuccess=r);records=[];document.getElementById("list").innerHTML="";alert("已清空");});

async function exportPackageZip(){
  if(!records.length)return alert("❌ 导出失败：暂无数据！");
  const z=new JSZip(),wb=XLSX.utils.book_new();
  wb.Props={Title:"光子盘点",Author:"光子盘点系统"};
  const ws=XLSX.utils.json_to_sheet([],{header:["序号","时间","条码","产品类别","产品名称","规格","颜色","数量","码类型","备注","图片编号"]});
  records.forEach((r,i)=>{
    const id=`IMG_${String(i+1).padStart(4,"0")}`;
    XLSX.utils.sheet_add_json(ws,[{
      序号:i+1,
      时间:r.time,
      条码:r.code,
      产品类别:r.category,
      产品名称:r.model,
      规格:r.spec,
      颜色:r.color,
      数量:r.qty,
      码类型:r.codeType === 'item' ? '单品码' : '主码',
      备注:r.note,
      图片编号:id
    }],{skipHeader:true,origin:i+1});
    const img=new Image();img.src=r.image;
    const c=document.createElement("canvas"),ctx=c.getContext("2d");
    c.width=img.width;c.height=img.height;
    ctx.drawImage(img,0,0,img.width,img.height);
    z.folder("images").file(`${id}.jpg`,r.image.split(",")[1],{base64:true});
  });
  const cat={};records.forEach(r=>cat[r.category]=(cat[r.category]||0)+Number(r.qty||0));
  Object.keys(cat).forEach(k=>XLSX.utils.sheet_add_json(ws,[{序号:"",时间:"",条码:"",产品类别:k,产品名称:"类别合计",规格:"",颜色:"",数量:cat[k],码类型:"",备注:"",图片编号:""}],{skipHeader:true,origin:-1}));
  XLSX.utils.sheet_add_json(ws,[{序号:"",时间:"",条码:"",产品类别:"总计",产品名称:"盘点总计",规格:"",颜色:"",数量:records.reduce((s,r)=>s+Number(r.qty||0),0),码类型:"",备注:"",图片编号:""}],{skipHeader:true,origin:-1});
  XLSX.utils.book_append_sheet(wb,ws,"盘点数据");
  const d=new Date(),ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  z.file(`光子盘点_${ds}.zip`,XLSX.write(wb,{bookType:"xlsx",type:"array"}),{binary:true});
  await saveAs(await z.generateAsync({type:"blob",compression:"STORE"}),`光子盘点_${ds}.zip`);
  alert("✅ ZIP 导出成功！");
}

async function exportPackageExcel(){
  if(!records.length)return alert("❌ 导出失败：暂无数据！");
  const btn=document.querySelector(".toolbar button[onclick*='toggleExportMenu']");
  btn.innerText="⏳ 生成中";btn.disabled=true;
  try{
    const workbook=new ExcelJS.Workbook();
    const ws=workbook.addWorksheet("盘点清单");
    ws.columns=[
      {header:"序号",width:6},
      {header:"时间",width:20},
      {header:"条码",width:18},
      {header:"产品类别",width:10},
      {header:"图片",width:18},
      {header:"产品名称",width:16},
      {header:"规格",width:12},
      {header:"颜色",width:10},
      {header:"数量",width:8},
      {header:"码类型",width:10},
      {header:"备注",width:16}
    ];
    const MAX_EXPORT_IMAGES = 500;
    for(let i=0;i<Math.min(records.length,MAX_EXPORT_IMAGES);i++){
      const r=records[i];
      ws.addRow([i+1,r.time,r.code,r.category,"",r.model,r.spec,r.color,r.qty,r.codeType === 'item' ? '单品码' : '主码',r.note]);
      if(!r.image)continue;
      const base64=r.image.startsWith("data:image")?r.image.split(",")[1]:null;
      if(!base64)continue;
      const imageId=workbook.addImage({base64,extension:"jpeg"});
      ws.addImage(imageId, {
        tl: { col: 4, row: i + 1 },
        ext: { width: 220, height: 165 },
        editAs: "absolute"
      });
      ws.getRow(i+2).height = 130;
    }
    const cat={};records.forEach(r=>cat[r.category]=(cat[r.category]||0)+Number(r.qty||0));
    Object.keys(cat).forEach(k=>{const row=ws.addRow([]);row.getCell(6).value=k+" 合计：";row.getCell(9).value=cat[k];});
    const total=records.reduce((s,r)=>s+Number(r.qty||0),0);
    const tr=ws.addRow([]);tr.getCell(6).value="盘点总计：";tr.getCell(9).value=total;
    const d=new Date(),ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
    const buffer=await workbook.xlsx.writeBuffer();
    saveAs(new Blob([buffer],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}),`光子盘点_${ds}_带图.xlsx`);
    alert("✅ Excel 导出成功！");
  }catch(e){alert("❌ Excel 导出失败："+e.message);}
  finally{btn.innerText="📤 导出";btn.disabled=false;document.getElementById("exportMenu").style.display="none";}
}

async function importCodeDict(){const inp=document.createElement("input");inp.type="file";inp.accept=".xlsx,.xls";inp.onchange=async e=>{const f=e.target.files[0];if(!f)return;const wb=XLSX.read(await f.arrayBuffer(),{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];const data=XLSX.utils.sheet_to_json(ws);if(!data.length)return alert("❌ 文件中无有效数据");const db=await openDB();let added=0,updated=0;for(const r of data){const code=r["条码"]||r["code"];const name=r["产品名称"]||r["model"];if(!code||!name)continue;const exists=await new Promise(res=>db.transaction(STORE_CODE,"readonly").objectStore(STORE_CODE).get(code).onsuccess=e=>res(!!e.target.result));await saveCodeMapping(code,name);exists?updated++:added++;}alert(`✅ 导入完成\n新增：${added}\n覆盖更新：${updated}`);openCodeModal();};inp.click();}

function showCategoryPicker(){
  const sel=document.createElement("select");

    o.value=o.text=c;
    if(c===quickCategory)o.selected=true;
    sel.appendChild(o);
  });
  sel.onchange=()=>{
    quickCategory=sel.value;
    document.getElementById("currentCat").innerText=quickCategory;
    document.getElementById("inp_category").value=quickCategory;
    sel.remove();
  };
  sel.onblur=()=>sel.remove();
