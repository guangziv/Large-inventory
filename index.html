<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>扫码最终版</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<!-- ✅ 官方扫码库（CDN） -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/minified_html5-qrcode.min.js"></script>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;text-align:center;padding:20px;background:#f5f5f5}
button{padding:16px 30px;font-size:20px;border-radius:10px;border:none;background:#007bff;color:#fff;cursor:pointer}
#preview{width:100%;height:220px;background:#000;margin:15px 0;border-radius:8px;display:none}
#status{margin-top:15px;padding:12px;border-radius:6px;font-size:15px;word-break:break-all}
.success{background:#d4edda;color:#155724}
.error{background:#f8d7da;color:#721c24}
.info{background:#cce5ff;color:#004085}
</style>
</head>

<body>

<h3>扫码最终版</h3>
<p>点击按钮，查看下方提示</p>

<button id="scanBtn">📱 点击扫码</button>

<div id="preview"></div>
<div id="status" class="info">等待操作...</div>

<script>
let html5QrCode = null;
let isScanning = false;

// ✅ 关键：等页面 + JS 全部加载完成
window.onload = function () {

  const btn = document.getElementById("scanBtn");
  const preview = document.getElementById("preview");
  const status = document.getElementById("status");

  if (!window.Html5Qrcode) {
    status.className = "error";
    status.innerHTML = "❌ 扫码库加载失败<br>请检查网络或刷新页面";
    btn.disabled = true;
    return;
  }

  btn.addEventListener("click", () => {
    if (isScanning) {
      stopScan();
      return;
    }
    startScan();
  });

  function startScan() {
    isScanning = true;
    preview.style.display = "block";
    status.className = "info";
    status.innerHTML = "📡 正在请求摄像头...";

    html5QrCode = new Html5Qrcode("preview");

    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 220, height: 140 } },
      code => {
        stopScan();
        status.className = "success";
        status.innerHTML = `✅ 扫码成功：<br><strong>${code}</strong>`;
      },
      err => {
        if (!err.includes("NotFoundException")) {
          console.warn(err);
        }
      }
    ).catch(err => {
      showError("摄像头启动失败", err);
    });

    setTimeout(() => {
      if (isScanning) {
        stopScan();
        status.className = "error";
        status.innerHTML = "⏱ 扫码超时";
      }
    }, 10000);
  }

  function stopScan() {
    isScanning = false;
    if (html5QrCode) {
      html5QrCode.stop().catch(() => {});
    }
    preview.style.display = "none";
    btn.innerText = "📱 点击扫码";
  }

  function showError(title, err) {
    stopScan();
    status.className = "error";
    let reason = "未知错误";

    if (err.name === "NotAllowedError" || err.message.includes("Permission denied")) {
      reason = "浏览器拒绝了摄像头权限<br>👉 请点击地址栏左侧「🔒」允许摄像头";
    } else if (err.name === "NotFoundError") {
      reason = "未检测到摄像头";
    } else {
      reason = err.message;
    }

    status.innerHTML = `❌ ${title}<br><small>${reason}</small>`;
  }
};
</script>

</body>
</html>
