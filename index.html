<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>手机扫码器 - 点击启动摄像头</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        .scanner-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* 未启动时的引导界面 */
        .start-guide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 30;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .guide-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .guide-title {
            color: white;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .guide-desc {
            color: #aaa;
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
            padding: 0 40px;
        }

        .big-start-btn {
            background: linear-gradient(135deg, #00ccaa, #00aa88);
            border: none;
            color: white;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,200,150,0.4);
            cursor: pointer;
            transition: 0.2s;
        }

        .big-start-btn:active {
            transform: scale(0.96);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .scan-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75vw;
            height: 75vw;
            max-width: 320px;
            max-height: 320px;
            border-radius: 24px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        .scan-area::before,
        .scan-area::after,
        .scan-corner-top-right,
        .scan-corner-bottom-left {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            border-color: #00ffcc;
            border-style: solid;
            border-width: 0;
        }

        .scan-area::before {
            top: -4px;
            left: -4px;
            border-top-width: 5px;
            border-left-width: 5px;
            border-radius: 6px 0 0 0;
        }

        .scan-area::after {
            top: -4px;
            right: -4px;
            border-top-width: 5px;
            border-right-width: 5px;
            border-radius: 0 6px 0 0;
        }

        .scan-corner-top-right {
            bottom: -4px;
            left: -4px;
            border-bottom-width: 5px;
            border-left-width: 5px;
            border-radius: 0 0 0 6px;
        }

        .scan-corner-bottom-left {
            bottom: -4px;
            right: -4px;
            border-bottom-width: 5px;
            border-right-width: 5px;
            border-radius: 0 0 6px 0;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ffcc, #00ffaa, transparent);
            animation: scanMove 2.2s ease-in-out infinite;
            box-shadow: 0 0 8px #00ffcc;
            opacity: 0.9;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .info-panel {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }

        .status-text {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 48px;
            font-size: 14px;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 12px;
            border: 0.5px solid rgba(255,255,255,0.3);
            pointer-events: auto;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
            pointer-events: auto;
        }

        .ctrl-btn {
            background: rgba(30, 30, 40, 0.85);
            backdrop-filter: blur(12px);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            border: 0.5px solid rgba(255,255,240,0.3);
            cursor: pointer;
        }

        .ctrl-btn:active {
            transform: scale(0.96);
            background: rgba(0, 150, 136, 0.9);
        }

        .result-toast {
            position: fixed;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 14px 20px;
            color: #f0f0f0;
            font-size: 14px;
            text-align: center;
            z-index: 25;
            word-break: break-all;
            border: 1px solid #00ffcc66;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .close-toast {
            pointer-events: auto;
            background: #00ccaa;
            margin-top: 8px;
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
            font-size: 13px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .error-msg {
            position: absolute;
            top: 50%;
            left: 20px;
            right: 20px;
            transform: translateY(-50%);
            background: #e11d48cc;
            backdrop-filter: blur(16px);
            padding: 24px;
            border-radius: 32px;
            text-align: center;
            color: white;
            z-index: 35;
            font-weight: 500;
            border: 1px solid #ffaaaa;
        }
    </style>
</head>
<body>
<div class="scanner-container">
    <video id="video" autoplay playsinline muted></video>
    
    <!-- 启动引导界面 -->
    <div id="startGuide" class="start-guide">
        <div class="guide-icon">📷</div>
        <div class="guide-title">扫码助手</div>
        <div class="guide-desc">点击下方按钮，允许相机权限后即可扫描二维码</div>
        <button class="big-start-btn" id="guideStartBtn">开启扫描</button>
    </div>

    <div class="overlay">
        <div class="scan-area">
            <div class="scan-line"></div>
            <div class="scan-corner-top-right"></div>
            <div class="scan-corner-bottom-left"></div>
        </div>
    </div>
    
    <div class="info-panel">
        <div class="status-text" id="statusMsg">⚡ 点击开启扫描</div>
        <div class="button-group">
            <button class="ctrl-btn" id="switchCamBtn" style="opacity:0.6;">🔄 切换镜头</button>
        </div>
    </div>
    
    <div id="resultToast" class="result-toast hidden">
        <div id="toastContent">扫描结果</div>
        <div class="close-toast" id="closeToastBtn">关闭</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/instascan@1.0.0/instascan.min.js"></script>

<script>
    (function() {
        const videoElement = document.getElementById('video');
        const statusSpan = document.getElementById('statusMsg');
        const startGuide = document.getElementById('startGuide');
        const guideStartBtn = document.getElementById('guideStartBtn');
        const switchCamBtn = document.getElementById('switchCamBtn');
        const resultToastDiv = document.getElementById('resultToast');
        const toastContentSpan = document.getElementById('toastContent');
        const closeToastBtn = document.getElementById('closeToastBtn');

        let scanner = null;
        let activeCamera = null;
        let allCameras = [];
        let isScanning = false;
        
        let lastScannedData = '';
        let lastScanTime = 0;
        const SCAN_DEBOUNCE_MS = 2000;

        function setStatus(text, isError = false) {
            statusSpan.innerText = text;
            if (isError) {
                statusSpan.style.background = "rgba(220, 38, 38, 0.85)";
            } else {
                statusSpan.style.background = "rgba(0, 0, 0, 0.65)";
            }
        }

        function showResult(content) {
            const rawText = (content || '').trim();
            if (!rawText) return;

            const now = Date.now();
            if (lastScannedData === rawText && (now - lastScanTime) < SCAN_DEBOUNCE_MS) {
                return;
            }
            lastScannedData = rawText;
            lastScanTime = now;

            toastContentSpan.innerText = rawText;
            resultToastDiv.classList.remove('hidden');
            
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(200);
            }
            setStatus(`✅ 已扫描: ${rawText.substring(0, 18)}${rawText.length > 18 ? '…' : ''}`, false);
            
            if (navigator.clipboard && rawText) {
                navigator.clipboard.writeText(rawText).catch(e => console.warn('复制失败', e));
            }
        }

        function hideToast() {
            resultToastDiv.classList.add('hidden');
        }

        async function stopScanner() {
            if (scanner && isScanning) {
                try {
                    await scanner.stop();
                } catch(e) {}
                isScanning = false;
            }
            if (videoElement && videoElement.srcObject) {
                const tracks = videoElement.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                videoElement.srcObject = null;
            }
        }

        async function startScanning(cameraId = null) {
            try {
                setStatus("正在请求相机权限...");
                
                // 停止之前的
                await stopScanner();
                
                if (!scanner) {
                    scanner = new Instascan.Scanner({
                        video: videoElement,
                        mirror: true,
                        backgroundScan: false,
                        continuous: true,
                        refractoryPeriod: 800,
                        scanPeriod: 1
                    });
                    scanner.addListener('scan', function(content) {
                        if (content && typeof content === 'string') {
                            showResult(content);
                        }
                    });
                }
                
                let cameras = await Instascan.Camera.getCameras();
                if (!cameras || cameras.length === 0) {
                    throw new Error('未检测到摄像头');
                }
                allCameras = cameras;
                
                let targetCamera = null;
                if (cameraId) {
                    targetCamera = cameras.find(cam => cam.id === cameraId);
                }
                if (!targetCamera) {
                    targetCamera = cameras.find(cam => cam.name && (cam.name.toLowerCase().includes('back') || cam.name.toLowerCase().includes('environment')));
                    if (!targetCamera) targetCamera = cameras[0];
                }
                
                activeCamera = targetCamera.id;
                await scanner.start(targetCamera);
                isScanning = true;
                
                // 启用切换按钮
                switchCamBtn.style.opacity = "1";
                setStatus("🔍 扫描中 · 对准二维码");
                
                // 隐藏引导界面
                startGuide.classList.add('hidden');
                
            } catch (err) {
                console.error(err);
                setStatus(`❌ 相机错误: ${err.message || '请检查权限'}`, true);
                throw err;
            }
        }

        async function switchCamera() {
            if (!isScanning) {
                setStatus("请先开启扫描", false);
                setTimeout(() => {
                    if (!isScanning) setStatus("⚡ 点击开启扫描");
                }, 1500);
                return;
            }
            
            if (!allCameras || allCameras.length < 2) {
                setStatus("📱 只有一个摄像头", false);
                setTimeout(() => {
                    if (isScanning) setStatus("🔍 扫描中 · 对准二维码");
                }, 1200);
                return;
            }
            
            let currentIndex = allCameras.findIndex(cam => cam.id === activeCamera);
            let nextIndex = (currentIndex + 1) % allCameras.length;
            const nextCam = allCameras[nextIndex];
            if (!nextCam) return;
            
            setStatus("🔄 切换摄像头中...");
            try {
                await stopScanner();
                await startScanning(nextCam.id);
            } catch (e) {
                setStatus("切换失败", true);
                startGuide.classList.remove('hidden');
                isScanning = false;
            }
        }

        // 主要启动入口：用户点击后请求权限
        async function onUserStart() {
            try {
                await startScanning();
            } catch (err) {
                // 显示错误让用户重试
                startGuide.classList.remove('hidden');
                const existingError = document.querySelector('.error-msg');
                if (existingError) existingError.remove();
                
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-msg';
                errorDiv.innerHTML = `
                    <div>⚠️ 无法访问摄像头</div>
                    <div style="font-size:13px; margin-top:8px;">${err.message || '请确保已授予相机权限'}</div>
                    <button class="close-toast" id="errorRetryBtn" style="margin-top:16px; background:#fff; color:#000;">重试</button>
                `;
                document.querySelector('.scanner-container').appendChild(errorDiv);
                const retryBtn = document.getElementById('errorRetryBtn');
                if (retryBtn) {
                    retryBtn.addEventListener('click', () => {
                        errorDiv.remove();
                        onUserStart();
                    });
                }
            }
        }

        // 事件绑定
        guideStartBtn.addEventListener('click', onUserStart);
        switchCamBtn.addEventListener('click', switchCamera);
        closeToastBtn.addEventListener('click', hideToast);
        
        // 可选: 点击 toast 背景关闭
        resultToastDiv.addEventListener('click', (e) => {
            if (e.target === resultToastDiv) hideToast();
        });
        
        // 防止页面滚动干扰
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.closest('.ctrl-btn') || e.target.closest('.close-toast')) return;
            e.preventDefault();
        }, { passive: false });
        
        // 页面可见性变化时如果扫描停止，只是提示，需要用户点引导按钮（但引导已被隐藏，需要特殊处理）
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !isScanning && startGuide.classList.contains('hidden')) {
                // 异常情况：扫描停止了但界面显示扫描中
                setStatus("相机已断开，请刷新重试", true);
            }
        });
    })();
</script>
</body>
</html>
