<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>扫码</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
body{font-family:sans-serif;text-align:center}
button{padding:12px 24px;font-size:16px}
#out{padding:12px;word-break:break-all}
</style>
</head>
<body>

<h3>扫码</h3>
<button onclick="start()">允许摄像头并开始扫码</button>
<div id="r" style="margin-top:12px"></div>
<p id="out"></p>

<script>
function start(){
  document.getElementById("out").innerText="正在请求摄像头权限...";

  const scanner = new Html5QrcodeScanner(
    "r",
    { fps:10,qrbox:{width:250,height:250} },
    false
  );

  scanner.render(
    code=>document.getElementById("out").innerText="扫码结果："+code,
    err=>document.getElementById("out").innerText="请允许摄像头权限才能扫码"
  );
}
</script>

</body>
</html>
