<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>光子盘点</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<!-- ✅ 官方扫码库 -->
<script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;margin:0;touch-action:none}
h3{text-align:center;font-size:24px;font-weight:bold;margin:10px 0}
#cameraWrap{position:relative;width:100vw;height:50vh;background:#000;overflow:hidden}
#video{width:100%;height:100%;object-fit:cover;transform-origin:center;will-change:transform;transform:translateZ(0)}
.focus-frame{position:absolute;top:50%;left:50%;width:240px;height:160px;transform:translate(-50%,-50%);border:2.5px solid #0ff;border-radius:10px;animation:breath 1.5s ease-in-out infinite}
@keyframes breath{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}50%{opacity:.6;transform:translate(-50%,-50%) scale(1.05)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#cameraActions{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:10}
#captureBtn{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.95);border:4px solid #07f;font-size:30px;display:flex;align-items:center;justify-content:center;padding:0;}
#scanBtn{width:72px;height:72px;border-radius:50%;background:rgba(40,167,69,.95);border:4px solid #fff;font-size:26px;display:flex;align-items:center;justify-content:center;padding:0;color:#fff;}
.toolbar{display:flex;justify-content:space-around;padding:10px 5px;background:#111;position:sticky;bottom:0;z-index:100}
.toolbar button{border:none;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px;flex:1;margin:0 4px;max-width:120px}
.toolbar button:nth-child(1){background:#17a2b8}
.toolbar button:nth-child(2){background:#28a745}
.toolbar button:nth-child(3){background:#ffc107;color:#333}
.toolbar button:nth-child(4){background:#fd7e14}
.toolbar button:nth-child(5){background:#6f42c1}
.toolbar button:nth-child(6){background:#20c997}
.toolbar button:nth-child(7){background:#dc3545}
#list{overflow-x:auto;padding:10px;display:none}
#list table{width:100%;border-collapse:collapse;background:#fff;font-size:12px}
#list table th,#list table td{border:1px solid #ddd;padding:6px;text-align:center;white-space:nowrap}
#list table th:last-child,#list table td:last-child{position:sticky;right:0;background:#fff;width:70px;min-width:70px}
#list table td:last-child button{width:100%;padding:6px 0;font-size:16px;background:#dc3545;color:#fff;border:none;border-radius:4px}
#list table tfoot td{position:sticky;bottom:0;background:#fff;font-weight:bold;border-top:2px solid #007bff;font-size:14px;z-index:2}
.modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:999}
.modal{background:#fff;padding:10px;border-radius:10px;width:92%;max-width:420px;max-height:88vh;overflow-y:auto;border:1px solid #007bff}
.modal h4{margin:5px 0 10px;font-size:17px;text-align:center;color:#007bff}
.form-group{margin-bottom:8px}
.form-group label{font-size:13px;color:#666;display:block;margin-bottom:3px}
.form-group input,.form-group select{width:100%;padding:9px;box-sizing:border-box;border:1px solid #ddd;border-radius:4px;font-size:16px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#007bff;box-shadow:0 0 0 2px rgba(0,123,255,.2)}
#previewImg{max-width:100%;width:auto;max-height:140px;object-fit:contain;margin-bottom:8px;border-radius:6px;border:1px solid #ddd;display:block;margin-left:auto;margin-right:auto}
.modal button[onclick="saveRecord()"]{width:100%;padding:14px 16px;margin-top:8px;background:linear-gradient(180deg,#28a745,#fd7e14);border:none;border-radius:10px;color:#fff;font-size:18px;font-weight:bold;box-shadow:0 4px 10px rgba(40,167,69,.35)}
.modal button[onclick="saveRecord()"]:active{transform:scale(.98)}
.thumbnail{width:50px;height:50px;object-fit:cover;border-radius:4px;cursor:pointer}
#exportMenu{display:none;position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#222;border-radius:12px;padding:6px 0;z-index:9999;min-width:180px;box-shadow:0 8px 30px rgba(0,0,0,.45)}
#exportMenu div{padding:14px 18px;color:#fff;font-size:15px}
#exportMenu div:active{background:#444}
#imgModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center;z-index:999}
#imgModal img{max-width:100%;max-height:100%}

.qty-control{display:flex;align-items:center}
.qty-control input{flex:1;text-align:center;border-radius:0;border-left:none;border-right:none}
.qty-btn{flex:0 0 44px;height:44px;font-size:22px;font-weight:bold;border:1px solid #ddd;background:#f8f9fa;cursor:pointer;user-select:none}
.qty-btn:first-child{border-radius:4px 0 0 4px}
.qty-btn:last-child{border-radius:0 4px 4px 0}
.list-summary{position:sticky;top:0;background:#007bff;color:#fff;padding:8px 12px;font-size:16px;font-weight:bold;z-index:10;border-radius:6px 6px 0 0;margin-bottom:-1px}
.advanced-toggle{text-align:center;color:#007bff;font-size:13px;margin-top:10px;cursor:pointer}
.advanced-panel{display:none;border-top:1px solid #eee;padding-top:8px;margin-top:8px}

#scanner_container{width:100%;height:220px;background:#000;border-radius:6px;margin-bottom:10px;display:none}

#codeListContainer{max-height:300px;overflow-y:auto;margin-top:8px;border:1px solid #eee;border-radius:4px}
.code-item{display:flex;justify-content:space-between;align-items:center;padding:8px;font-size:13px;border-bottom:1px solid #eee}
.code-item:last-child{border-bottom:none}
.code-item span{font-weight:bold;color:#007bff}
.code-item button{background:#dc3545;color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:12px}
</style>
</head>

<body>
<h3>📦 光子盘点</h3>

<div id="cameraWrap">
  <video id="video" autoplay playsinline></video>
  <div class="focus-frame"></div>
  <div id="cameraActions">
    <button id="scanBtn">📱</button>
    <button id="captureBtn">📸</button>
  </div>
</div>

<div class="toolbar">
  <button onclick="rotate()">🔄 旋转</button>
  <button id="toggleListBtn" onclick="toggleList()">📋 清单</button>
  <button onclick="createBackup()">📥 备份</button>
  <button onclick="toggleExportMenu()">📤 导出</button>
  <button onclick="openRestoreModal()">♻️ 恢复</button>
  <button onclick="location.href='https://guangziv.github.io/Inventory/'">🔄 最新版</button>
  <button onclick="clearAll()">🗑️ 清空</button>
</div>

<div id="exportMenu">
  <div onclick="exportPackageZip()">📦 导出数据包</div>
  <div onclick="exportPackageExcel()">📷 导出带图 Excel</div>
</div>

<div class="modal-mask" id="formModal">
  <div class="modal">
    <h4>商品信息录入</h4>

    <!-- ✅ 扫码区域 -->
    <div id="scanner_container"></div>

    <img id="previewImg">

    <div class="form-group"><label>产品名称</label><input id="inp_name"></div>

    <div class="form-group">
      <label>产品类别</label>
      <select id="inp_category">
        <option value="床架">床架</option>
        <option value="床垫">床垫</option>
        <option value="床头柜">床头柜</option>
        <option value="沙发">沙发</option>
        <option value="小件">小件</option>
      </select>
    </div>

    <div class="form-group">
      <label>规格</label>
      <select id="inp_spec">
        <option value="1.8*2.0">1.8 × 2.0</option>
        <option value="1.5*2.0">1.5 × 2.0</option>
        <option value="custom">定制</option>
      </select>
    </div>

    <div class="form-group" id="customSpecGroup" style="display:none">
      <label>自定义规格</label>
      <input id="inp_custom_spec">
    </div>

    <div class="advanced-toggle" onclick="document.getElementById('advancedPanel').style.display = document.getElementById('advancedPanel').style.display === 'none' ? 'block' : 'none'">⚙️ 高级选项</div>

    <div class="advanced-panel" id="advancedPanel">
      <div class="form-group"><label>颜色</label><input id="inp_color"></div>
      <div class="form-group"><label>备注</label><input id="inp_note"></div>
    </div>

    <button onclick="openCodeModal()" style="width:100%;padding:10px;margin-top:10px;background:#6f42c1;color:#fff;border:none;border-radius:6px;font-size:14px">📇 管理条码字典</button>

    <div class="form-group">
      <label>数量</label>
      <div class="qty-control">
        <div class="qty-btn" onclick="changeQty(-1)">−</div>
        <input id="inp_qty" type="number" value="1" inputmode="numeric">
        <div class="qty-btn" onclick="changeQty(1)">+</div>
      </div>
    </div>

    <button onclick="saveRecord()">✅ 保存</button>
  </div>
</div>

<div class="modal-mask" id="codeModal">
  <div class="modal">
    <h4>条码字典管理</h4>
    <div class="form-group">
      <input id="codeSearch" type="text" placeholder="搜索条码或名称..." oninput="searchCode()">
    </div>
    <div id="codeListContainer"></div>
    <button onclick="closeCodeModal()" style="width:100%;padding:10px;margin-top:10px;background:#ccc;border:none;border-radius:6px">关闭</button>
  </div>
</div>

<div class="modal-mask" id="restoreModal">
  <div class="modal">
    <h4>恢复备份</h4>
    <div id="backupListContainer" style="max-height:300px;overflow-y:auto"></div>
    <button onclick="closeRestoreModal()" style="width:100%;padding:10px;margin-top:10px;background:#ccc;border:none;border-radius:6px">关闭</button>
  </div>
</div>

<div id="imgModal" onclick="this.style.display='none'"><img id="bigImg"></div>
<div id="list"></div>

<script>
const DB_NAME="PhotonInventoryDB",DB_VER=2,STORE_REC="records",STORE_BAK="backups",STORE_CODE="codes";
let records=[],dbReady=false,tempImage="",scale=1,offsetX=0,offsetY=0,rotation=0,listVisible=false,isScanning=false;
let html5QrCode = null;
let allCodesCache = [];

const BASE_CODE_MAP = {"150501006156":"望月CX2603(大象灰)-床头"};

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>video.srcObject=s);

function applyTransform(){video.style.transform=`translate(${offsetX}px,${offsetY}px) scale(${scale}) rotate(${rotation}deg)`}

document.getElementById("inp_category").onchange=function(){
  const g=document.getElementById("customSpecGroup");
  g.style.display=["床头柜","沙发","小件"].includes(this.value)?"block":(document.getElementById("inp_spec").value==="custom"?"block":"none");
};
document.getElementById("inp_spec").onchange=function(){
  document.getElementById("customSpecGroup").style.display=this.value==="custom"?"block":"none";
};

function changeQty(delta){
  const inp=document.getElementById("inp_qty");
  inp.value=Math.max(1,(parseInt(inp.value)||1)+delta);
}

captureBtn.onpointerdown=function(e){
  e.preventDefault();
  const c=document.createElement("canvas"),ctx=c.getContext("2d");
  const frame = document.querySelector('.focus-frame');
  const videoRect = video.getBoundingClientRect();
  const scaleX = video.videoWidth / videoRect.width;
  const scaleY = video.videoHeight / videoRect.height;

  let sx = (frame.offsetLeft - videoRect.left + offsetX) * scaleX / scale;
  let sy = (frame.offsetTop - videoRect.top + offsetY) * scaleY / scale;
  let sw = frame.offsetWidth * scaleX / scale;
  let sh = frame.offsetHeight * scaleY / scale;

  sx = Math.max(0, sx); sy = Math.max(0, sy);
  sw = Math.min(video.videoWidth - sx, sw); sh = Math.min(video.videoHeight - sy, sh);

  c.width = sw; c.height = sh;
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

  tempImage = c.toDataURL("image/jpeg", 0.65);
  document.getElementById("previewImg").src = tempImage;
  document.getElementById("formModal").style.display = "flex";
};

scanBtn.onpointerdown = e => { e.preventDefault(); startScan(); };

function startScan() {
  if (isScanning) return;
  isScanning = true;

  const container = document.getElementById("scanner_container");
  container.style.display = "block";
  document.getElementById("formModal").style.display = "flex";

  html5QrCode = new Html5Qrcode("scanner_container");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 220, height: 140 } },
    async decodedText => {
      await stopScan();
      navigator.vibrate && navigator.vibrate(100);

      const productName = await findProductNameByCode(decodedText);
      document.getElementById("inp_name").value = productName || decodedText;
    },
    error => console.debug(error)
  );
}

function stopScan() {
  if (!html5QrCode || !isScanning) return;
  return html5QrCode.stop().then(() => {
    document.getElementById("scanner_container").style.display = "none";
    isScanning = false;
  });
}

async function findProductNameByCode(code){
  if(BASE_CODE_MAP[code]) return BASE_CODE_MAP[code];
  const db = await openDB();
  return new Promise(res => {
    const req = db.transaction(STORE_CODE,"readonly").objectStore(STORE_CODE).get(code);
    req.onsuccess = () => res(req.result ? req.result.name : null);
  });
}

async function saveCodeMapping(code, name){
  if(!code || !name || code === name) return;
  const db = await openDB();
  await new Promise(r => db.transaction(STORE_CODE,"readwrite").objectStore(STORE_CODE).put({code, name}).onsuccess=r);
}

function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE_REC))db.createObjectStore(STORE_REC,{keyPath:"id",autoIncrement:true});if(!db.objectStoreNames.contains(STORE_BAK))db.createObjectStore(STORE_BAK,{keyPath:"key"});if(!db.objectStoreNames.contains(STORE_CODE))db.createObjectStore(STORE_CODE,{keyPath:"code"})};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}

async function initDB(){const db=await openDB();dbReady=true;await loadRecords(db)}
async function loadRecords(db){return new Promise(res=>db.transaction(STORE_REC,"readonly").objectStore(STORE_REC).getAll().onsuccess=e=>{records=e.target.result||[];res()})}

const saveRecord=async()=>{
  const n=document.getElementById("inp_name").value.trim();
  if(!n)return alert("产品名称不能为空");

  let s=document.getElementById("inp_spec").value;
  s=s==="custom"?document.getElementById("inp_custom_spec").value.trim()||"定制":s;

  const code = n.match(/^\d+$/) ? n : null;
  if(code) await saveCodeMapping(code, n);

  const db = await openDB();
  await new Promise(r=>db.transaction(STORE_REC,"readwrite").objectStore(STORE_REC).add({
    time:new Date().toLocaleString(),
    name:n,
    category:document.getElementById("inp_category").value,
    spec:s,
    color:document.getElementById("inp_color").value.trim(),
    qty:document.getElementById("inp_qty").value,
    note:document.getElementById("inp_note").value.trim(),
    image:tempImage
  }).onsuccess=r);

  await loadRecords(db);
  document.getElementById("formModal").style.display="none";
  alert("保存成功！");
};

function toggleList(){
  listVisible=!listVisible;
  document.getElementById("list").style.display=listVisible?"block":"none";
  if(listVisible)renderList();
}

function renderList(){
  if(!records.length){document.getElementById("list").innerHTML="<p style='text-align:center;color:#999'>暂无数据</p>";return}
  let h=`<table><tr><th>序号</th><th>时间</th><th>类别</th><th>图片</th><th>名称</th><th>规格</th><th>数量</th><th>操作</th></tr>`;
  records.forEach((r,i)=>{
    h+=`<tr><td>${i+1}</td><td>${r.time}</td><td>${r.category}</td><td><img src="${r.image}" class="thumbnail" onclick="document.getElementById('bigImg').src=this.src;document.getElementById('imgModal').style.display='flex'"></td><td>${r.name}</td><td>${r.spec}</td><td>${r.qty}</td><td><button onclick="deleteRecord(${i})">🗑️</button></td></tr>`;
  });
  h+=`</table>`;
  document.getElementById("list").innerHTML=h;
}

initDB();
</script>
</body>
</html>
